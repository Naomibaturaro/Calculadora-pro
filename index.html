<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Pro+</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="loader">
        <div class="rulo-css"></div>
        <p>Cocinando magia...</p>
    </div>

    <main class="app-container" style="opacity: 0;">
        <div class="visual-wrapper">
            <div class="soporte-aura"></div>
            
            <div class="calculadora-glass">
                <div class="display">
                    <div id="operacion-texto" class="operacion"></div>
                    <div id="resultado-vivo" class="res-preview">0</div>
                </div>
                
                <div class="teclado">
                    <button class="btn-clear" onclick="limpiar()">C</button>
                    <button class="btn-op" onclick="op('/')">÷</button>
                    <button class="btn-op" onclick="op('*')">×</button>
                    <button class="btn-op" onclick="borrar()">⌫</button>
                    
                    <button onclick="num('7')">7</button>
                    <button onclick="num('8')">8</button>
                    <button onclick="num('9')">9</button>
                    <button class="btn-op" onclick="op('-')">-</button>
                    
                    <button onclick="num('4')">4</button>
                    <button onclick="num('5')">5</button>
                    <button onclick="num('6')">6</button>
                    <button class="btn-op" onclick="op('+')">+</button>
                    
                    <button onclick="num('1')">1</button>
                    <button onclick="num('2')">2</button>
                    <button onclick="num('3')">3</button>
                    <button class="btn-igual" onclick="resolver()">=</button>
                    
                    <button class="btn-cero" onclick="num('0')">0</button>
                    <button onclick="num('.')">.</button>
                </div>
            </div>
        </div>

        <div class="historial-container">
            <h3>Historial</h3>
            <ul id="lista-historial"></ul>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
